ai_usage_summary: |
  Used an AI agent to help refine heuristic logic, implement the strict ranking constraints, and generate the reporting structures. No LLM calls happen during runtime evaluation.

methodology_summary: |
  Rule-based ranker with explicit reasoning capture. We implemented a high-performance heuristic scoring module incorporating semantic keyword matching for embeddings and vector DBs. It applies strict anti-honeypot logic and uses the behavioral signals as a multiplier to derive a final robust score. Memory is kept low by streaming the JSONL.

